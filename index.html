<!-- Generated using a neural network model DeepSeek-V3 -->
<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG preview</title>
    <link rel="stylesheet" href="style.css" />

</head>

<body>

    <div class="editor">

        <h3 style="color: white;">SVG code</h3>

        <textarea id="svgInput">

            <svg viewBox="0 0 100 100" width="400" height="400">
            <rect x="10" y="10" width="80" height="80" fill="#61afef" />
            <circle cx="50" cy="50" r="30" fill="#98c379" />
            <text x="50" y="55" text-anchor="middle" fill="white" font-size="12">SVG</text>
            </svg>

        </textarea>

        <button onclick="renderSVG()">🔄 Refresh</button>

        <div id="errorMsg" class="error"></div>

    </div>

    <div class="preview">

        <div id="preview"></div>

    </div>

    <script>

        function renderSVG() {

            const svgCode = document.getElementById('svgInput').value;
            const previewDiv = document.getElementById('preview');
            const errorDiv = document.getElementById('errorMsg');

            try {

                errorDiv.textContent = '';

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = svgCode;

                let svgElement = tempDiv.querySelector('svg');
                if (!svgElement) {

                    throw new Error('Not found <svg> element');

                }

                previewDiv.innerHTML = '';

                const clonedSvg = svgElement.cloneNode(true);
                previewDiv.appendChild(clonedSvg);

                console.log('✓ SVG');

            } catch (error) {

                errorDiv.textContent = '❌ Error: ' + error.message;
                console.error('Render error:', error);

            }

        }

        renderSVG();

        let timeout;

        document.getElementById('svgInput').addEventListener('input', () => {

            clearTimeout(timeout);
            timeout = setTimeout(renderSVG, 500);

        }

        );

    </script>

</body>

</html>
